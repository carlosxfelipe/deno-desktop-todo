<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Bright blue sky background -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#7dbef0;stop-opacity:1"/>
      <stop offset="55%"  style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1"/>
    </linearGradient>

    <!-- Ambient glow behind the clipboard -->
    <radialGradient id="ambient-glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%"   style="stop-color:#bae6fd;stop-opacity:0.55"/>
      <stop offset="60%"  style="stop-color:#7dd3fc;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7dd3fc;stop-opacity:0"/>
    </radialGradient>

    <!-- Clipboard base: light grey/steel with cool highlight -->
    <linearGradient id="head-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#f4f7fb;stop-opacity:1"/>
      <stop offset="35%"  style="stop-color:#c5cdd8;stop-opacity:1"/>
      <stop offset="65%"  style="stop-color:#7d8a9c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3d4757;stop-opacity:1"/>
    </linearGradient>

    <!-- Clipboard front-face (slightly cooler, shows depth) -->
    <linearGradient id="head-face" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#9aa6b8;stop-opacity:1"/>
      <stop offset="50%"  style="stop-color:#cdd5e0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6b7686;stop-opacity:1"/>
    </linearGradient>

    <!-- Glossy specular streak across head (Tahoe glass) -->
    <linearGradient id="head-gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  style="stop-color:#ffffff;stop-opacity:0.65"/>
      <stop offset="45%" style="stop-color:#ffffff;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>

    <!-- Wooden handle gradient -->
    <linearGradient id="handle-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#6b3a1d;stop-opacity:1"/>
      <stop offset="40%"  style="stop-color:#a76a3a;stop-opacity:1"/>
      <stop offset="60%"  style="stop-color:#c98d56;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5a2f17;stop-opacity:1"/>
    </linearGradient>

    <!-- Handle cap / wrap (leather strap accent) -->
    <linearGradient id="strap-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1810;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0e0703;stop-opacity:1"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="14" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.55"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft blur for the ambient glow -->
    <filter id="bolt-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background: Squircle -->
  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#bg-grad)"/>

  <!-- Ambient soft glow -->
  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#ambient-glow)"/>

  <!-- Checklist / Todo List Icon -->
  <g transform="translate(512, 512) scale(1.8)" filter="url(#soft-shadow)">
    <!-- Clipboard Base (Paper) -->
    <rect x="-140" y="-180" width="280" height="360" rx="24" fill="url(#head-grad)" />
    <!-- Paper Front Face -->
    <rect x="-136" y="-176" width="272" height="352" rx="20" fill="#ffffff" />
    
    <!-- Top Clip Board Mechanism -->
    <rect x="-80" y="-200" width="160" height="50" rx="12" fill="url(#strap-grad)" />
    <rect x="-60" y="-190" width="120" height="20" rx="6" fill="url(#handle-grad)" />
    <!-- Clip Highlight -->
    <rect x="-76" y="-196" width="152" height="6" rx="3" fill="rgba(255,255,255,0.15)" />
    
    <!-- List Item 1 -->
    <rect x="-90" y="-80" width="40" height="40" rx="10" fill="rgba(0,0,0,0.04)" stroke="rgba(0,0,0,0.08)" stroke-width="3" />
    <!-- Checkmark for Item 1 -->
    <path d="M -80 -60 L -72 -52 L -55 -75" fill="none" stroke="#10b981" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="-20" y="-70" width="120" height="20" rx="10" fill="rgba(0,0,0,0.1)" />

    <!-- List Item 2 -->
    <rect x="-90" y="-10" width="40" height="40" rx="10" fill="rgba(0,0,0,0.04)" stroke="rgba(0,0,0,0.08)" stroke-width="3" />
    <!-- Checkmark for Item 2 -->
    <path d="M -80 10 L -72 18 L -55 -5" fill="none" stroke="#10b981" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="-20" y="0" width="90" height="20" rx="10" fill="rgba(0,0,0,0.1)" />

    <!-- List Item 3 (Unchecked) -->
    <rect x="-90" y="60" width="40" height="40" rx="10" fill="rgba(0,0,0,0.04)" stroke="rgba(0,0,0,0.08)" stroke-width="3" />
    <rect x="-20" y="70" width="110" height="20" rx="10" fill="rgba(0,0,0,0.1)" />
    
    <!-- List Item 4 (Unchecked) -->
    <rect x="-90" y="130" width="40" height="40" rx="10" fill="rgba(0,0,0,0.04)" stroke="rgba(0,0,0,0.08)" stroke-width="3" />
    <rect x="-20" y="140" width="80" height="20" rx="10" fill="rgba(0,0,0,0.1)" />
  </g>

  <!-- Subtle top sheen on the squircle (Tahoe glass) -->
  <path d="M 0 0 H 1024 V 320 Q 512 460 0 320 Z"
        fill="rgba(255,255,255,0.05)"/>
</svg>
